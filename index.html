<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habit Garden</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <canvas id="garden"></canvas>

  <!-- Auth overlay -->
  <div id="auth-overlay" class="hidden">
    <div id="auth-box">
      <h2>Habit Garden</h2>
      <form id="auth-form">
        <input type="email" id="auth-email" placeholder="Email" required />
        <input type="password" id="auth-password" placeholder="Password" required />
        <button type="submit" id="auth-submit">Log In</button>
      </form>
      <p id="auth-error"></p>
      <button id="auth-toggle">Need an account? Sign up</button>
    </div>
  </div>

  <!-- UI overlay -->
  <div id="ui">
    <h1>Habit Garden</h1>
    <div id="habit-list"></div>
    <form id="add-form">
      <input type="text" id="habit-input" placeholder="New habit..." required />
      <button type="submit">+ Add</button>
    </form>
  </div>

  <!-- Toolbar: share + logout -->
  <div id="toolbar" style="display:none">
    <button id="btn-share">Share</button>
    <button id="btn-logout">Logout</button>
  </div>

  <!-- Plant detail panel (shown on click) -->
  <div id="detail" class="hidden">
    <h2 id="detail-name"></h2>
    <p id="detail-streak"></p>
    <p id="detail-total"></p>
    <button id="detail-done">Done today</button>
    <button id="detail-close">Close</button>
    <button id="detail-delete">Delete</button>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
