<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habit Garden</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <canvas id="garden"></canvas>

  <!-- UI overlay -->
  <div id="ui">
    <h1>Habit Garden</h1>
    <div id="habit-list"></div>
    <form id="add-form">
      <input type="text" id="habit-input" placeholder="New habit..." required />
      <button type="submit">+ Add</button>
    </form>
  </div>

  <!-- Plant detail panel (shown on click) -->
  <div id="detail" class="hidden">
    <h2 id="detail-name"></h2>
    <p id="detail-streak"></p>
    <p id="detail-total"></p>
    <button id="detail-done">Done today</button>
    <button id="detail-close">Close</button>
    <button id="detail-delete">Delete</button>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
